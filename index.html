<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naan Stop Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f7f3ee;
      color: #1e1e1e;
      line-height: 1.6;
    }

    .hero {
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
      url('https://images.unsplash.com/photo-1546833999-b9f581a1996d?q=80&w=1600&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      height: 45vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .hero h1 {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 1100px;
      margin: auto;
      padding: 50px 0;
    }

    .section-title {
      font-size: 2rem;
      margin-bottom: 25px;
      font-weight: 700;
      color: #d35400;
      border-left: 6px solid #d35400;
      padding-left: 15px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      margin-bottom: 60px;
    }

    .menu-item {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      transition: transform 0.2s ease;
    }

    .menu-item:hover {
      transform: translateY(-5px);
    }

    .menu-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .menu-top h3 {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .price {
      color: #d35400;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .menu-item p {
      color: #666;
      font-size: 0.95rem;
    }

    .menu-image-wrapper {
      background: white;
      padding: 20px;
      border-radius: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .menu-image {
      width: 100%;
      border-radius: 15px;
    }

    .info-box {
      margin-top: 35px;
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .info-box h2 {
      color: #d35400;
      margin-bottom: 10px;
    }

    footer {
      background: #1e1e1e;
      color: white;
      text-align: center;
      padding: 30px 20px;
      margin-top: 50px;
    }

    .socials {
      margin-top: 15px;
    }

    .socials a {
      color: #f39c12;
      margin: 0 10px;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 2.5rem;
      }

      .hero p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div>
      <h1>Naan Stop</h1>
      <p>Authentieke Pakistaanse smaken</p>
    </div>
  </section>

  <div class="container">

    <div class="menu-image-wrapper">
      <img src="menu.jpg" alt="Naan Stop Menu" class="menu-image">
    </div>

    <div class="info-box">
      <h2>Scan & Bekijk Ons Menu</h2>
      <p>Authentieke Pakistaanse gerechten vers bereid met liefde en kruiden.</p>
    </div>

  </div>

  <footer>
    <h3>Naan Stop</h3>
    <p>Open dagelijks van 12:00 tot 22:00</p>

    <div class="socials">
      <a href="#">Instagram</a>
      <a href="#">TikTok</a>
      <a href="#">Google Maps</a>
    </div>
  </footer>

</body>
</html>
